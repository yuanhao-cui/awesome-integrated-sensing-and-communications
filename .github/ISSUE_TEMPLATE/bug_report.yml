name: 🐛 Bug Report
description: Report a bug in baseline code
labels: ["bug"]
body:
  - type: dropdown
    id: baseline
    attributes:
      label: Which Baseline?
      options:
        - OFDM-ISAC
        - CRB Analysis
        - Radar-Comm Trade-off
        - MIMO Beamforming
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: "What went wrong?"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Run ... 2. See error ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "What should have happened?"
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.10 / 3.11 / 3.12"
